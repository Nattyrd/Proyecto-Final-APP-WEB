basePath: /api
definitions:
  apperrors.ErrorResponse:
    properties:
      code:
        type: string
        example: NOT_FOUND
      message:
        type: string
        example: Recurso no encontrado
    type: object
  apperrors.ValidationErrorResponse:
    properties:
      code:
        type: string
        example: BAD_REQUEST
      message:
        type: string
        example: Error de validación en los datos enviados
      details:
        type: array
        items:
          type: string
        example:
          - "Username: es obligatorio"
          - "Email: debe ser un correo electrónico válido"
    type: object
  dto.PaginatedProductsResponse:
    properties:
      data:
        items:
          $ref: "#/definitions/dto.ProductResponse"
        type: array
      page:
        type: integer
        example: 1
      pageSize:
        type: integer
        example: 10
      totalItems:
        type: integer
        example: 42
      totalPages:
        type: integer
        example: 5
    type: object
  dto.AuthResponse:
    properties:
      token:
        type: string
      user:
        $ref: "#/definitions/dto.UserResponse"
    type: object
  dto.CreateProductRequest:
    properties:
      description:
        maxLength: 500
        type: string
      name:
        maxLength: 120
        minLength: 2
        type: string
      price:
        type: number
      stock:
        minimum: 0
        type: integer
    required:
      - name
      - price
      - stock
    type: object
  dto.CreateReceiptItemRequest:
    properties:
      productId:
        type: integer
      quantity:
        type: integer
    required:
      - productId
      - quantity
    type: object
  dto.CreateReceiptRequest:
    properties:
      items:
        items:
          $ref: "#/definitions/dto.CreateReceiptItemRequest"
        minItems: 1
        type: array
      userId:
        type: integer
    required:
      - items
      - userId
    type: object
  dto.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
      - password
      - username
    type: object
  dto.ProductResponse:
    properties:
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      price:
        type: number
      stock:
        type: integer
    type: object
  dto.ReceiptItemResponse:
    properties:
      id:
        type: integer
      productId:
        type: integer
      quantity:
        type: integer
      subtotal:
        type: number
      unitPrice:
        type: number
    type: object
  dto.ReceiptResponse:
    properties:
      createdAt:
        type: string
      id:
        type: integer
      items:
        items:
          $ref: "#/definitions/dto.ReceiptItemResponse"
        type: array
      total:
        type: number
      userId:
        type: integer
    type: object
  dto.RegisterRequest:
    properties:
      email:
        maxLength: 120
        type: string
      firstName:
        maxLength: 80
        minLength: 2
        type: string
      lastName:
        maxLength: 80
        minLength: 2
        type: string
      password:
        maxLength: 72
        minLength: 6
        type: string
      username:
        maxLength: 50
        minLength: 3
        type: string
    required:
      - email
      - firstName
      - lastName
      - password
      - username
    type: object
  dto.UpdateProductRequest:
    properties:
      description:
        maxLength: 500
        type: string
      name:
        maxLength: 120
        minLength: 2
        type: string
      price:
        type: number
      stock:
        minimum: 0
        type: integer
    type: object
  dto.UpdateUserRequest:
    properties:
      email:
        maxLength: 120
        type: string
      firstName:
        maxLength: 80
        minLength: 2
        type: string
      lastName:
        maxLength: 80
        minLength: 2
        type: string
      password:
        maxLength: 72
        minLength: 6
        type: string
    type: object
  dto.UserResponse:
    properties:
      email:
        type: string
      firstName:
        type: string
      id:
        type: integer
      lastName:
        type: string
      username:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: grupo5@epn.edu.ec
    name: Grupo 5 - Aplicaciones Web
  description:
    API RESTful de e-commerce desarrollada con Go, Gin, GORM, PostgreSQL
    y JWT.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: E-commerce API - Grupo 5
  version: "1.0"
paths:
  /products:
    get:
      description: Obtiene los productos con soporte de paginación. Si no se especifican parámetros, se devuelven los primeros 10 resultados.
      parameters:
        - description: "Número de página (defecto: 1)"
          in: query
          minimum: 1
          name: page
          type: integer
        - description: "Resultados por página (defecto: 10, máximo: 100)"
          in: query
          maximum: 100
          minimum: 1
          name: pageSize
          type: integer
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: "#/definitions/dto.PaginatedProductsResponse"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
      summary: Listar productos (paginado)
      tags:
        - products
    post:
      consumes:
        - application/json
      description: Registra un nuevo producto en el catalogo
      parameters:
        - description: Datos del producto
          in: body
          name: request
          required: true
          schema:
            $ref: "#/definitions/dto.CreateProductRequest"
      produces:
        - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: "#/definitions/dto.ProductResponse"
        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
        "401":
          description: Unauthorized
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
      security:
        - BearerAuth: []
      summary: Crear producto
      tags:
        - products
  /products/{id}:
    delete:
      description: Elimina un producto del catalogo
      parameters:
        - description: ID del producto
          in: path
          name: id
          required: true
          type: integer
      produces:
        - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
        "401":
          description: Unauthorized
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
        "404":
          description: Not Found
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
      security:
        - BearerAuth: []
      summary: Eliminar producto
      tags:
        - products
    get:
      description: Consulta un producto por su identificador
      parameters:
        - description: ID del producto
          in: path
          name: id
          required: true
          type: integer
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: "#/definitions/dto.ProductResponse"
        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
        "404":
          description: Not Found
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
      summary: Obtener producto por ID
      tags:
        - products
    put:
      consumes:
        - application/json
      description: Modifica los datos de un producto existente
      parameters:
        - description: ID del producto
          in: path
          name: id
          required: true
          type: integer
        - description: Datos a actualizar
          in: body
          name: request
          required: true
          schema:
            $ref: "#/definitions/dto.UpdateProductRequest"
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: "#/definitions/dto.ProductResponse"
        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
        "401":
          description: Unauthorized
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
        "404":
          description: Not Found
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
      security:
        - BearerAuth: []
      summary: Actualizar producto
      tags:
        - products
  /receipts:
    get:
      description: Obtiene todos los recibos registrados
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: "#/definitions/dto.ReceiptResponse"
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
      security:
        - BearerAuth: []
      summary: Listar recibos
      tags:
        - receipts
    post:
      consumes:
        - application/json
      description: Procesa una compra, calcula el total en backend y descuenta stock
      parameters:
        - description: Datos de la compra
          in: body
          name: request
          required: true
          schema:
            $ref: "#/definitions/dto.CreateReceiptRequest"
      produces:
        - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: "#/definitions/dto.ReceiptResponse"
        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
        "401":
          description: Unauthorized
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
        "404":
          description: Not Found
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
      security:
        - BearerAuth: []
      summary: Crear recibo
      tags:
        - receipts
  /receipts/{id}:
    delete:
      description: Elimina un recibo existente
      parameters:
        - description: ID del recibo
          in: path
          name: id
          required: true
          type: integer
      produces:
        - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
        "401":
          description: Unauthorized
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
        "404":
          description: Not Found
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
      security:
        - BearerAuth: []
      summary: Eliminar recibo
      tags:
        - receipts
    get:
      description: Consulta un recibo con sus items
      parameters:
        - description: ID del recibo
          in: path
          name: id
          required: true
          type: integer
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: "#/definitions/dto.ReceiptResponse"
        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
        "401":
          description: Unauthorized
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
        "404":
          description: Not Found
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
      security:
        - BearerAuth: []
      summary: Obtener recibo por ID
      tags:
        - receipts
  /receipts/user/{userId}:
    get:
      description: Obtiene los recibos asociados a un usuario
      parameters:
        - description: ID del usuario
          in: path
          name: userId
          required: true
          type: integer
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: "#/definitions/dto.ReceiptResponse"
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
        "401":
          description: Unauthorized
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
        "404":
          description: Not Found
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
      security:
        - BearerAuth: []
      summary: Listar recibos por usuario
      tags:
        - receipts
  /users/{id}:
    delete:
      description: Elimina un usuario autenticado
      parameters:
        - description: ID del usuario
          in: path
          name: id
          required: true
          type: integer
      produces:
        - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
        "401":
          description: Unauthorized
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
        "404":
          description: Not Found
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
      security:
        - BearerAuth: []
      summary: Eliminar usuario
      tags:
        - users
    get:
      description: Consulta los datos de un usuario (sin contrasena)
      parameters:
        - description: ID del usuario
          in: path
          name: id
          required: true
          type: integer
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: "#/definitions/dto.UserResponse"
        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
        "404":
          description: Not Found
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
      summary: Obtener usuario por ID
      tags:
        - users
    put:
      consumes:
        - application/json
      description: Actualiza los datos de un usuario autenticado
      parameters:
        - description: ID del usuario
          in: path
          name: id
          required: true
          type: integer
        - description: Datos a actualizar
          in: body
          name: request
          required: true
          schema:
            $ref: "#/definitions/dto.UpdateUserRequest"
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: "#/definitions/dto.UserResponse"
        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
        "401":
          description: Unauthorized
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
        "403":
          description: Forbidden
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
        "404":
          description: Not Found
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
        "409":
          description: Conflict
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
      security:
        - BearerAuth: []
      summary: Actualizar usuario
      tags:
        - users
  /users/login:
    post:
      consumes:
        - application/json
      description: Autentica un usuario y devuelve un token JWT
      parameters:
        - description: Credenciales
          in: body
          name: request
          required: true
          schema:
            $ref: "#/definitions/dto.LoginRequest"
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: "#/definitions/dto.AuthResponse"
        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
        "401":
          description: Unauthorized
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
      summary: Iniciar sesion
      tags:
        - users
  /users/register:
    post:
      consumes:
        - application/json
      description: Crea un nuevo usuario y devuelve un token JWT
      parameters:
        - description: Datos de registro
          in: body
          name: request
          required: true
          schema:
            $ref: "#/definitions/dto.RegisterRequest"
      produces:
        - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: "#/definitions/dto.AuthResponse"
        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
        "409":
          description: Conflict
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/apperrors.ErrorResponse"
      summary: Registrar usuario
      tags:
        - users
securityDefinitions:
  BearerAuth:
    description: "Ingrese el token JWT con el prefijo Bearer. Ejemplo: Bearer eyJhbGciOiJIUzI1NiIs..."
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
